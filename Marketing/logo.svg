<svg width="300" height="76" viewBox="0 0 300 76" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Certum">
  <defs>
    <linearGradient id="certum-badge" x1="10" y1="10" x2="66" y2="66" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A2450"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="10" y="10" width="56" height="56" rx="16" fill="url(#certum-badge)"/>

  <!-- mira: círculo externo + retícula -->
  <circle cx="38" cy="38" r="17" stroke="#F0B429" stroke-width="2.6" fill="none"/>
  <line x1="38" y1="14" x2="38" y2="24" stroke="#F0B429" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="38" y1="52" x2="38" y2="62" stroke="#F0B429" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="14" y1="38" x2="24" y2="38" stroke="#F0B429" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="52" y1="38" x2="62" y2="38" stroke="#F0B429" stroke-width="2.6" stroke-linecap="round"/>

  <!-- alvo central: o cliente certo -->
  <circle cx="38" cy="38" r="9" stroke="#FFFFFF" stroke-width="1.6" stroke-opacity="0.55" fill="none"/>
  <circle cx="38" cy="38" r="4" fill="#FFFFFF"/>

  <!-- wordmark -->
  <text x="84" y="49" font-family="Sora, 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5" fill="#0B1220">Certum<tspan fill="#F0B429">.</tspan></text>
</svg>
